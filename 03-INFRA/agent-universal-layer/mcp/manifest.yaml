# ============================================================================
# CANONICAL MCP MANIFEST  ·  Agent-OS (single source of truth)
# ----------------------------------------------------------------------------
# This file describes EVERY MCP server exactly once, in abstract form.
# A generator (mcp/render.py) translates it into each CLI's dialect (Claude,
# Codex, Antigravity, OpenCode) on every machine. You edit HERE; everything
# else is generated.
#
# RULES:
#  - No secrets in here. Tokens are referenced by environment variable NAME,
#    never by value. Secrets live in env / 99-SECRETS.
#  - transport: "stdio" (local process) | "http" (remote server with bearer).
#  - targets: which CLIs mount this server.
#  - schema_version: keep this at 1 until a documented migration says otherwise.
#  - Conditionality: servers marked `require_env` are included only if the
#    user has set the matching environment variable. This way, a Local-Only
#    install doesn't load MCP servers pointing at absent backends. The user
#    configures the architecture in 99-INDEX/USER-PROFILE.md and sets the
#    matching env vars. The renderer must omit any server whose `require_env`
#    is not satisfied.
# ============================================================================

schema_version: 1

# Add an exact old server name here only after a deliberate retirement. Live
# connectors outside `servers` remain additive by default; tombstones are the
# explicit, cross-CLI removal mechanism.
retired_servers: []

servers:

  # ---- interactive browser (always available) ------------------------

  # npx resolves an exact package version.  Update a pin only after testing
  # it deliberately, then keep the previous engine pin available for rollback.

  playwright:
    transport: stdio
    command: npx
    args: ["-y", "@playwright/mcp@0.0.78", "--cdp-endpoint", "http://localhost:9222"]
    targets: [claude, codex, antigravity, opencode]
    windows:
      command: node
      args: ["${AGENT_ENGINE_ROOT}\\agent-universal-layer\\mcp\\playwright-human-safe.mjs", "--cdp-endpoint", "http://localhost:9222"]

  # ---- self-hosted backend (Cloud-Server mode only) --------------------
  # Ports come from env vars set by the user; sane defaults aligned with
  # 03-INFRA/deploy/*.yml. If the env var is absent, the renderer omits the
  # server (require_env).

  firecrawl:
    transport: stdio
    command: npx
    args: ["-y", "firecrawl-mcp@3.22.3"]
    env:
      FIRECRAWL_API_URL: "http://127.0.0.1:${FIRECRAWL_TUNNEL_PORT:-33002}"
    require_env: FIRECRAWL_TUNNEL_PORT
    targets: [claude, codex, antigravity, opencode]

  n8n-mcp:
    transport: http
    url: "http://127.0.0.1:${N8N_TUNNEL_PORT:-5678}/mcp-server/http"
    auth: { type: bearer, env: N8N_MCP_TOKEN }
    require_env: N8N_MCP_TOKEN
    timeouts: { startup: 120, tool: 600 }          # only used by Codex
    targets: [claude, codex, antigravity, opencode]

  vault-library:
    transport: http
    url: "${VAULT_LIBRARY_URL}"
    url_env: VAULT_LIBRARY_URL                      # OpenCode parameterizes the url via env
    auth: { type: bearer, env: VAULT_LIBRARY_TOKEN }
    require_env: VAULT_LIBRARY_URL
    timeouts: { startup: 120, tool: 120 }
    targets: [claude, codex, antigravity, opencode]

  vault-ocr:
    transport: stdio
    command: python3
    args: ["${KNOWLEDGE_VAULT_PATH}/03-INFRA/deploy/ocr/mcp/vault_ocr_mcp.py"]
    env:
      VAULT_OCR_API_URL: "http://127.0.0.1:${OCR_TUNNEL_PORT:-33003}"
    require_env: OCR_TUNNEL_PORT
    timeouts: { startup: 30, tool: 120 }           # tool 120s: RapidOCR on a 1.5-CPU VPS can exceed the 30s default
    targets: [claude, codex, antigravity, opencode]
    windows:
      command: python
      args: ["${KNOWLEDGE_VAULT_PATH}\\03-INFRA\\deploy\\ocr\\mcp\\vault_ocr_mcp.py"]
      env:
        VAULT_OCR_API_URL: "http://127.0.0.1:${OCR_TUNNEL_PORT:-33003}"

  # ---- extra per-CLI (opzionali, non bloccanti) ----------------------------

  # filesystem: EXPLICIT roots only, never the whole home. The default here
  # is limited to the two canonical product roots — the installed engine
  # (AGENT_ENGINE_ROOT) and the private data root (AGENT_VAULT_DATA), the
  # same variables agent_sync.py/council.py/vault-push.sh already resolve
  # (falling back to ~/.nexgen-engine/03-INFRA and ~/KnowledgeVault). This
  # keeps the agent's filesystem trust plane scoped to what the product
  # actually needs instead of every personal file under the user's home.
  # To extend it: add more absolute paths as extra `args` entries below (the
  # filesystem server accepts any number of root directories) — do not widen
  # this back to a single `${HOME}` argument in the shared template.
  filesystem:
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem@2026.7.10", "${AGENT_ENGINE_ROOT}", "${AGENT_VAULT_DATA}"]
    targets: [codex]

  # memory: a SECOND, non-authoritative memory channel that lives outside the
  # KnowledgeVault (the single source of truth for memory in this layer) and
  # is never synced, versioned, or reviewed the way vault notes are. Off by
  # default; opt in per-machine by setting MCP_MEMORY_OPT_IN (any non-empty
  # value) if you specifically want this separate scratch memory and accept
  # that it diverges from the Vault.
  memory:
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-memory@2026.7.4"]
    require_env: MCP_MEMORY_OPT_IN
    targets: [codex]
