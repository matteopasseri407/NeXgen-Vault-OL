# Firecrawl self-hosted stack — current upstream (NUQ/Postgres) architecture.
# Upstream: https://github.com/firecrawl/firecrawl (moved from
# github.com/mendableai/firecrawl; the GHCR org moved the same way).
#
# ARCHITECTURE (migrated 2026-07-14, deliberate decision — closes the open
# item the previous revision of this file documented): the 2.11 image line
# requires the Postgres-backed NUQ queue + RabbitMQ; the old API+worker+
# Redis-only shape crash-loops on these images (missing NUQ_DATABASE_URL).
# Verified against two primary sources, not blog posts:
#   - upstream docker-compose.yaml at tag v2.11.91 (service set, env names,
#     harness command, rabbitmq healthcheck, nuq-postgres image),
#   - a production deployment of the same architecture running since
#     2026-07 (env shape incl. NUQ_DATABASE_URL/NUQ_DATABASE_URL_LISTEN).
# The api container runs upstream's docker harness (dist/src/harness.js
# --start-docker), which supervises the API plus all queue workers inside
# one container — upstream's intended mode for image-based deploys, and
# fewer moving parts than one-container-per-worker.
#
# Images are pinned to explicit version tags where upstream publishes them.
# ghcr.io/firecrawl/nuq-postgres and ghcr.io/firecrawl/playwright-service
# publish NO versioned tags (only `latest`), so they are pinned by sha256
# DIGEST below (resolved 2026-07-14) — same reproducibility, stronger than
# a mutable tag. To bump: docker pull <repo>:latest && docker inspect
# --format '{{index .RepoDigests 0}}' <repo>:latest, then update here or
# override via .env.
#
# AUTH (carried over from the 2026-07-12 NX audit, still true on 2.11):
#   - firecrawl-redis keeps requirepass from FIRECRAWL_REDIS_PASSWORD
#     (auto-generated by ../bootstrap-vps.sh; `:?` fails loudly if missing).
#   - nuq-postgres gets the same treatment via FIRECRAWL_POSTGRES_PASSWORD.
#   - firecrawl-api still has NO viable native token gate self-hosted
#     (USE_DB_AUTHENTICATION needs a real Supabase backend; unset/false
#     bypasses withAuth() entirely). Mitigation unchanged: every port is
#     bound to 127.0.0.1 and reachable only over an SSH tunnel.
#   - BULL_AUTH_KEY deliberately left unset: the admin router only mounts
#     `if (config.BULL_AUTH_KEY)` — unset means those routes don't exist,
#     which is a better default than a secret-URL gate.
#   - rabbitmq is unauthenticated ON THE DOCKER NETWORK ONLY (upstream shape:
#     NUQ_RABBITMQ_URL=amqp://...:5672); it publishes no host port at all.
#
# Rollback: FIRECRAWL_IMAGE=ghcr.io/firecrawl/firecrawl:<older-tag> docker
# compose -f firecrawl/docker-compose.yml up -d (see ../backup-restore.sh
# rollback). Durable state now EXISTS in this stack: the NUQ queue lives in
# the firecrawl-nuq-data volume (backup-restore.sh covers it); Redis remains
# a transient cache by design.
#
# Search endpoint note: scrape/crawl/extract work with this base file alone.
# The sibling docker-compose.search.yml overlay adds the pinned SearXNG +
# Brave API path used by the full Cloud-Server profile. bootstrap-vps.sh
# activates that overlay when BRAVE_SEARCH_API_KEY is present in .env.
#
# Do not combine SEARXNG_ENGINES with SEARXNG_CATEGORIES. SearXNG treats
# those selectors as a union, so `categories=general` silently re-enables
# fragile public engines alongside the explicit Brave backend.

services:
  firecrawl-api:
    image: ${FIRECRAWL_IMAGE:-ghcr.io/firecrawl/firecrawl:2.11.99}
    container_name: firecrawl-api
    restart: unless-stopped
    # Upstream's docker harness: supervises API + queue workers in-process.
    command: ["node", "dist/src/harness.js", "--start-docker"]
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      - HOST=0.0.0.0
      - PORT=3002
      - ENV=local
      - "REDIS_URL=redis://:${FIRECRAWL_REDIS_PASSWORD:?set FIRECRAWL_REDIS_PASSWORD in .env or run bootstrap-vps.sh}@firecrawl-redis:6379"
      - "REDIS_RATE_LIMIT_URL=redis://:${FIRECRAWL_REDIS_PASSWORD:?set FIRECRAWL_REDIS_PASSWORD in .env or run bootstrap-vps.sh}@firecrawl-redis:6379"
      - PLAYWRIGHT_MICROSERVICE_URL=http://firecrawl-playwright:3000/scrape
      - POSTGRES_HOST=firecrawl-nuq-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=firecrawl
      - "POSTGRES_PASSWORD=${FIRECRAWL_POSTGRES_PASSWORD:?set FIRECRAWL_POSTGRES_PASSWORD in .env or run bootstrap-vps.sh}"
      - POSTGRES_DB=postgres
      # Set explicitly, not only via POSTGRES_*: the 2.11 images hard-require
      # NUQ_DATABASE_URL (this is exactly what crash-looped the old shape).
      - "NUQ_DATABASE_URL=postgresql://firecrawl:${FIRECRAWL_POSTGRES_PASSWORD:?set FIRECRAWL_POSTGRES_PASSWORD in .env or run bootstrap-vps.sh}@firecrawl-nuq-postgres:5432/postgres"
      - "NUQ_DATABASE_URL_LISTEN=postgresql://firecrawl:${FIRECRAWL_POSTGRES_PASSWORD:?set FIRECRAWL_POSTGRES_PASSWORD in .env or run bootstrap-vps.sh}@firecrawl-nuq-postgres:5432/postgres"
      - NUQ_RABBITMQ_URL=amqp://firecrawl-rabbitmq:5672
      - USE_DB_AUTHENTICATION=false
      # Secrets: set these in .env on the VPS, never commit them.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Optional external search backend (see header note and search overlay).
      - SEARXNG_ENDPOINT=${SEARXNG_ENDPOINT:-}
      - SEARXNG_ENGINES=${SEARXNG_ENGINES:-}
      - "HEALTHCHECK_JS=require('http').get('http://127.0.0.1:3002/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
    depends_on:
      firecrawl-redis:
        condition: service_healthy
      firecrawl-playwright:
        condition: service_healthy
      firecrawl-rabbitmq:
        condition: service_healthy
      firecrawl-nuq-postgres:
        condition: service_healthy
    # The harness runs the API plus every worker in this one container --
    # give it the lion's share of the stack's budget.
    mem_limit: 3g
    healthcheck:
      test: ["CMD-SHELL", "node -e \"$$HEALTHCHECK_JS\""]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3

  firecrawl-redis:
    image: ${FIRECRAWL_REDIS_IMAGE:-redis:8.2.7-alpine}
    container_name: firecrawl-redis
    restart: unless-stopped
    # requirepass instead of no auth at all (finding C): the password comes
    # from .env / bootstrap-vps.sh's auto-generation, never something a user
    # has to invent. The `:?` fails the deploy loudly instead of silently
    # starting an unauthenticated Redis if it's ever missing.
    command: ["redis-server", "--requirepass", "${FIRECRAWL_REDIS_PASSWORD:?set FIRECRAWL_REDIS_PASSWORD in .env or run bootstrap-vps.sh}"]
    environment:
      # redis-cli (used by the healthcheck below) reads this automatically.
      - "REDISCLI_AUTH=${FIRECRAWL_REDIS_PASSWORD:?set FIRECRAWL_REDIS_PASSWORD in .env or run bootstrap-vps.sh}"
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3

  firecrawl-rabbitmq:
    # Pinned to the newest 3.x-management tag (upstream tracks the mutable
    # `3-management`); no host port on purpose — AMQP stays on the compose
    # network only.
    image: ${FIRECRAWL_RABBITMQ_IMAGE:-rabbitmq:3.13.7-management}
    container_name: firecrawl-rabbitmq
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      # Same probe upstream's compose uses.
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

  firecrawl-nuq-postgres:
    # Upstream's Postgres image with the NUQ schema baked in. No versioned
    # tags published — pinned by digest (see header for how to bump).
    image: ${FIRECRAWL_NUQ_POSTGRES_IMAGE:-ghcr.io/firecrawl/nuq-postgres@sha256:aed86f62858f29bd971abddcdeb301c12888098d2cf5d33c1ba42b053bc460f6}
    container_name: firecrawl-nuq-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=firecrawl
      - "POSTGRES_PASSWORD=${FIRECRAWL_POSTGRES_PASSWORD:?set FIRECRAWL_POSTGRES_PASSWORD in .env or run bootstrap-vps.sh}"
      - POSTGRES_DB=postgres
    volumes:
      - firecrawl-nuq-data:/var/lib/postgresql/data
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firecrawl -d postgres"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

  firecrawl-playwright:
    # No versioned tags published — pinned by digest (see header).
    image: ${FIRECRAWL_PLAYWRIGHT_IMAGE:-ghcr.io/firecrawl/playwright-service@sha256:6359b0d9070f27400b4a9b615509be06919e40121fc1fdc42d4efeddf02653d2}
    container_name: firecrawl-playwright
    restart: unless-stopped
    environment:
      - PORT=3000
      - BLOCK_MEDIA=${FIRECRAWL_BLOCK_MEDIA:-true}
      # NB: the 'connect' event passes no arguments — the socket is the
      # return value of connect(), so it must be captured, not taken from
      # the callback (the old callback form threw and failed every probe).
      - "HEALTHCHECK_JS=const s = require('net').connect(3000, '127.0.0.1'); s.on('connect', () => { s.end(); process.exit(0); }); s.on('error', () => process.exit(1));"
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "node -e \"$$HEALTHCHECK_JS\""]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  firecrawl-nuq-data:
