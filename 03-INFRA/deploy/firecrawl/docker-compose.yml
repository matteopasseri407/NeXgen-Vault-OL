# Firecrawl self-hosted stack.
# Upstream: https://github.com/firecrawl/firecrawl (moved from
# github.com/mendableai/firecrawl; the GHCR org moved the same way).
# This compose deploys the API + a single worker. For production scale-out
# add more workers or a Redis cluster; see the upstream repo.
#
# Images are pinned to explicit version tags where upstream publishes them.
# To also pin sha256 digests once you have Docker/registry access:
#   docker pull ghcr.io/firecrawl/firecrawl:2.11
#   docker inspect --format '{{index .RepoDigests 0}}' ghcr.io/firecrawl/firecrawl:2.11
# then set FIRECRAWL_IMAGE in .env to the printed ...@sha256:... value.
#
# VERIFIED 2026-07-12: ghcr.io/mendableai/firecrawl and
# ghcr.io/mendableai/firecrawl-playwright-service no longer resolve (the
# GHCR token exchange itself fails, i.e. the repos are gone, not just the
# tag). ghcr.io/firecrawl/firecrawl:2.11 resolves. ghcr.io/firecrawl/
# playwright-service publishes NO versioned tags at all today (only
# `latest`/`linux-amd64`/buildcache variants), so FIRECRAWL_PLAYWRIGHT_IMAGE
# below is pinned to `latest` on purpose, not by oversight -- the only real
# way to make it reproducible right now is to pin the sha256 digest you get
# from a `docker pull ... :latest` + `docker inspect`, the same way as above.
#
# NOT VERIFIED: whether the new ghcr.io/firecrawl/* images still honor the
# same `pnpm start:production` / `pnpm worker:production` commands and
# REDIS_URL / PLAYWRIGHT_MICROSERVICE_URL / PORT env vars this compose file
# assumes -- upstream's self-host docs describe a different multi-service
# architecture (Postgres-backed queue, SearXNG) for its current release
# line. This compose keeps the repo's existing simpler API+worker+Redis+
# Playwright shape on the theory that older-style images still accept it;
# validate against a real deploy before relying on this in production, and
# re-check upstream's current self-host docs if firecrawl-api/firecrawl-
# worker fail to start. Migrating to the new architecture is a separate,
# deliberate decision, not something this pass makes.
#
# Rollback: FIRECRAWL_IMAGE=ghcr.io/firecrawl/firecrawl:<older-tag> docker
# compose -f firecrawl/docker-compose.yml up -d (see ../backup-restore.sh
# rollback). No named volumes here — Redis is a transient cache/queue by
# design, so there is nothing durable to back up in this stack today.
#
# AUTH, investigated 2026-07-12 (NX audit finding B/C):
#   - firecrawl-redis previously had no requirepass/ACL, protected only by
#     Docker network isolation. Fixed below: requirepass from
#     FIRECRAWL_REDIS_PASSWORD (auto-generated by ../bootstrap-vps.sh on
#     first run if left empty in .env), REDIS_URL updated on both consumers.
#   - firecrawl-api's own HTTP API has NO viable native token gate in this
#     self-hosted build. Upstream's only app-level auth path is
#     USE_DB_AUTHENTICATION=true, which routes every request through
#     withAuth() (apps/api/src/lib/withAuth.ts) into a real Supabase
#     project (SUPABASE_URL/SUPABASE_ANON_TOKEN/SUPABASE_SERVICE_TOKEN) --
#     an external hosted Postgres+Auth backend, not something this
#     Postgres-less Redis+worker+Playwright stack can stand up in a small
#     patch. With USE_DB_AUTHENTICATION unset/false (the only realistic mode
#     here), withAuth() unconditionally bypasses every check and logs
#     "You're bypassing authentication" -- confirmed straight from upstream
#     source, not assumed. Treating this as a new architectural decision is
#     out of scope for this pass; the primary mitigation stays what it
#     already was: firecrawl-api/worker/redis/playwright are bound to
#     127.0.0.1 only (see ../README.md) and reachable solely over an SSH
#     tunnel, not the public interface. A minimal reverse-proxy token gate
#     (e.g. Caddy forward_auth) in front of firecrawl-api would close this
#     for good but adds a new component this pass deliberately does not
#     introduce -- left as a follow-up, finding B/firecrawl considered
#     partially mitigated (network isolation only), not fixed.
#   - BULL_AUTH_KEY was considered and deliberately NOT wired here: checked
#     against upstream source (apps/api/src/routes/admin.ts), the entire
#     admin router (redis-health, cache-clear, metrics, precrawl-trigger,
#     etc.) is registered only `if (config.BULL_AUTH_KEY)` -- leaving it
#     unset, as this compose file already did, means those admin routes
#     never mount at all. Setting it would add a new admin attack surface
#     gated only by a secret-URL-segment pattern, not remove one; that is a
#     worse default than the current "routes don't exist," so it is left
#     unset on purpose.

services:
  firecrawl-api:
    image: ${FIRECRAWL_IMAGE:-ghcr.io/firecrawl/firecrawl:2.11}
    container_name: firecrawl-api
    restart: unless-stopped
    command: ["pnpm", "start:production"]
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      - PORT=3002
      - "REDIS_URL=redis://:${FIRECRAWL_REDIS_PASSWORD:?set FIRECRAWL_REDIS_PASSWORD in .env or run bootstrap-vps.sh}@firecrawl-redis:6379"
      - PLAYWRIGHT_MICROSERVICE_URL=http://firecrawl-playwright:3000
      # Secrets: set these in .env on the VPS, never commit them.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - "HEALTHCHECK_JS=require('http').get('http://127.0.0.1:3002/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
    depends_on:
      firecrawl-redis:
        condition: service_healthy
      firecrawl-playwright:
        condition: service_healthy
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "node -e \"$HEALTHCHECK_JS\""]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3

  firecrawl-worker:
    image: ${FIRECRAWL_IMAGE:-ghcr.io/firecrawl/firecrawl:2.11}
    container_name: firecrawl-worker
    restart: unless-stopped
    command: ["pnpm", "worker:production"]
    environment:
      - "REDIS_URL=redis://:${FIRECRAWL_REDIS_PASSWORD:?set FIRECRAWL_REDIS_PASSWORD in .env or run bootstrap-vps.sh}@firecrawl-redis:6379"
      - PLAYWRIGHT_MICROSERVICE_URL=http://firecrawl-playwright:3000
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # The worker has no HTTP port of its own; this healthcheck proves it
      # can still reach Redis (its queue), which is the closest available
      # liveness signal without one.
      - "HEALTHCHECK_JS=require('net').connect(6379, 'firecrawl-redis').on('connect', s => { s.end(); process.exit(0); }).on('error', () => process.exit(1))"
    depends_on:
      firecrawl-redis:
        condition: service_healthy
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "node -e \"$HEALTHCHECK_JS\""]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  firecrawl-redis:
    image: ${FIRECRAWL_REDIS_IMAGE:-redis:8.2.7-alpine}
    container_name: firecrawl-redis
    restart: unless-stopped
    # requirepass instead of no auth at all (finding C): the password comes
    # from .env / bootstrap-vps.sh's auto-generation, never something a user
    # has to invent. The `:?` fails the deploy loudly instead of silently
    # starting an unauthenticated Redis if it's ever missing.
    command: ["redis-server", "--requirepass", "${FIRECRAWL_REDIS_PASSWORD:?set FIRECRAWL_REDIS_PASSWORD in .env or run bootstrap-vps.sh}"]
    environment:
      # redis-cli (used by the healthcheck below) reads this automatically.
      - "REDISCLI_AUTH=${FIRECRAWL_REDIS_PASSWORD:?set FIRECRAWL_REDIS_PASSWORD in .env or run bootstrap-vps.sh}"
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3

  firecrawl-playwright:
    image: ${FIRECRAWL_PLAYWRIGHT_IMAGE:-ghcr.io/firecrawl/playwright-service:latest}
    container_name: firecrawl-playwright
    restart: unless-stopped
    environment:
      - "HEALTHCHECK_JS=require('net').connect(3000, '127.0.0.1').on('connect', s => { s.end(); process.exit(0); }).on('error', () => process.exit(1))"
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "node -e \"$HEALTHCHECK_JS\""]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
