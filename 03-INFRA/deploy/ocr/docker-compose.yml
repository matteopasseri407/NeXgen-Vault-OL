# Vault OCR API (FastAPI + RapidOCR), built locally from ./api.
#
# Tagged with an explicit version (matching the FastAPI app's own `version=`
# in api/app.py) instead of "latest", so `docker images` and rollbacks are
# unambiguous even though the image is built on the VPS rather than pulled.
# To pin a digest for a build you trust, build once, then:
#   docker inspect --format '{{index .RepoDigests 0}}' vault-ocr-api:1.0.0
# (only populated once the image has been pushed to a registry you control —
# a purely local build has no RepoDigest to pin).
#
# Rollback: keep the previous build tagged (e.g. `docker tag vault-ocr-api:1.0.0
# vault-ocr-api:1.0.0-prev` before rebuilding), then:
#   OCR_IMAGE=vault-ocr-api:1.0.0-prev docker compose -f ocr/docker-compose.yml up -d --no-build
# (see ../backup-restore.sh rollback). This service has no named volume —
# nothing to back up.

services:
  vault-ocr-api:
    build: ./api
    image: ${OCR_IMAGE:-vault-ocr-api:1.0.0}
    container_name: vault-ocr-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3033:3033"
    environment:
      VAULT_OCR_MAX_BYTES: "15728640"
      # Optional bearer token (see .env.example + api/app.py:require_ocr_token).
      # Left empty by default: the API logs a WARN and stays open, matching
      # this service's historical no-auth behavior for local/tunnel-only
      # use. Fill it in to require the header on POST /ocr.
      VAULT_OCR_TOKEN: ${VAULT_OCR_TOKEN:-}
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    cpus: "1.50"
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3033/health', timeout=4).read()"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3
