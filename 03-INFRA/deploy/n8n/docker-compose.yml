# n8n automation engine.
#
# Image is pinned to an explicit, non-"latest" version tag so a redeploy on
# a fresh VPS reproduces the same n8n build. To also pin a sha256 digest
# (recommended once you have Docker/registry access):
#   docker pull n8nio/n8n:2.29.10
#   docker inspect --format '{{index .RepoDigests 0}}' n8nio/n8n:2.29.10
# then set N8N_IMAGE in .env to the printed n8nio/n8n@sha256:... value.
#
# Rollback: N8N_IMAGE=n8nio/n8n:<older-tag> docker compose -f n8n/docker-compose.yml up -d
# (see ../backup-restore.sh rollback). Backup/restore of the n8n-data volume:
# see ../backup-restore.sh backup / restore.

services:
  n8n:
    image: ${N8N_IMAGE:-n8nio/n8n:2.29.10}
    container_name: n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=127.0.0.1
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - GENERIC_TIMEZONE=${TZ:-UTC}
      # MCP server (enable in n8n Settings → MCP Server)
      # - N8N_MCP_TOKEN=${N8N_MCP_TOKEN}
    volumes:
      - n8n-data:/home/node/.n8n
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5678/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3

volumes:
  n8n-data:
