name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default to read-only GITHUB_TOKEN permissions for every job in this
# workflow (least privilege - none of the jobs below push commits, open
# PRs/issues, or publish releases/packages, so read access to repo
# contents is all any of them need). Add a job-level `permissions:`
# override only if a specific job later needs more.
permissions:
  contents: read

jobs:
  self-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Python syntax check
        run: find . -path ./.git -prune -o -name "*.py" -print0 | xargs -0 -n1 python3 -m py_compile

      - name: YAML syntax check
        run: |
          python3 - <<'EOF'
          import sys, glob, yaml

          failed = False
          patterns = ["**/*.yaml", "**/*.yml"]
          seen = set()
          for pattern in patterns:
              for path in glob.glob(pattern, recursive=True):
                  if ".git/" in path or path in seen:
                      continue
                  seen.add(path)
                  try:
                      with open(path) as f:
                          yaml.safe_load(f)
                  except Exception as exc:
                      print(f"INVALID YAML: {path}: {exc}")
                      failed = True
          sys.exit(1 if failed else 0)
          EOF

      - name: Shell syntax check
        run: find . -path ./.git -prune -o -name "*.sh" -print0 | xargs -0 -n1 bash -n

      - name: Preflight (install.sh --check)
        run: bash install.sh --check

      - name: Required invariant rules present in the canonical AGENTS.md
        # Drift guard: fails if a non-negotiable security/behaviour rule
        # silently drops out of the shipped bootstrap. Update
        # required-rules.txt in the same change when a rule is intentionally
        # reworded (that edit is the acknowledgement it moved).
        run: |
          python3 03-INFRA/scripts/check_required_rules.py \
            03-INFRA/agent-universal-layer/instructions/AGENTS.md \
            03-INFRA/agent-universal-layer/instructions/required-rules.txt

      - name: No committed Python bytecode or caches
        run: |
          hits="$(git ls-files | grep -E '\.pyc$|(^|/)__pycache__/' || true)"
          if [ -n "$hits" ]; then
            echo "Found committed Python bytecode/cache:"
            echo "$hits"
            exit 1
          fi

      - name: Leak-scan (anti-leak gates, S0)
        # Supersedes the old ad hoc "hardcoded home path" / "secret pattern"
        # greps: same patterns, but now scans EVERY commit newly introduced by
        # this push/PR (not just the final tree), so a value that lands in an
        # intermediate commit and is removed later still gets caught. Matches
        # are always redacted in the output — this log is public.
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              RANGE="${{ github.sha }}"
            else
              RANGE="$BEFORE..${{ github.sha }}"
            fi
          fi
          python3 03-INFRA/agent-universal-layer/leak-scan/leak_scan.py \
            --patterns 03-INFRA/agent-universal-layer/leak-scan/leak_patterns.yaml \
            --repo . \
            --commit-range "$RANGE"

  ruff-baseline:
    # NX-06: ruff is not clean yet (52 pre-existing findings at the time this
    # gate was added). Rather than fail every PR on that debt, or ignore ruff
    # entirely, this job compares current findings against a committed
    # baseline (03-INFRA/ruff-baseline.json), grouped by (file, rule code)
    # with a count. It fails ONLY when a (file, code) pair is new, or an
    # existing one's count goes UP - see 03-INFRA/scripts/ruff_baseline_check.py
    # for the exact rule and its docstring for how to regenerate the baseline
    # after intentionally fixing or accepting findings.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install ruff
        # Pinned to the version the committed baseline was generated with:
        # a ruff bump can change which rules fire by default and shift the
        # finding counts for reasons unrelated to any given PR's diff. Bump
        # this deliberately, alongside `--generate`-ing a fresh baseline.
        run: pip install "ruff==0.15.20"

      - name: Ruff baseline gate (03-INFRA)
        run: python3 03-INFRA/scripts/ruff_baseline_check.py

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: ShellCheck all shell scripts
        # Same discovery pattern as the "Shell syntax check" step in
        # self-check, swapping `bash -n` for `shellcheck`. ubuntu-latest
        # ships shellcheck preinstalled.
        run: find . -path ./.git -prune -o -name "*.sh" -print0 | xargs -0 shellcheck

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit (OCR requirements.txt)
        # Kept as its own step, scoped to exactly this one path, so a future
        # tracked --ignore-vuln exception for the OCR stack can never
        # silently leak onto any OTHER requirements*.txt discovered
        # elsewhere in the repo (Finding B, 2026-07-12: a single find|xargs
        # sweep used to apply the same --ignore-vuln flags to every
        # requirements*.txt found, OCR or not).
        #
        # No --ignore-vuln flags needed right now: fastapi was bumped to
        # 0.139.0 (-> starlette>=1.3.1), closing the 8 previously-tracked
        # starlette CVEs (PYSEC-2026-{161,248,249,1941,1942},
        # CVE-2026-{48817,48818}) -- validated live, 2026-07-12/13, see the
        # comment above the fastapi pin in requirements.txt. If a new,
        # narrow, tracked exception is ever needed again for this file, add
        # --ignore-vuln flags ONLY to this step, never to the sweep below.
        run: pip-audit -r 03-INFRA/deploy/ocr/api/requirements.txt

      - name: pip-audit (every other requirements*.txt in the repo)
        # No package.json/package-lock.json exists in this repo (checked at
        # the time this job was added) so there is no npm audit step; add
        # one alongside this if a Node project shows up later.
        #
        # Never gets --ignore-vuln: any OTHER requirements*.txt that shows
        # up in the repo gets the strict, unmodified scan. --no-run-if-empty
        # matters here because GNU xargs otherwise still invokes the command
        # once with a dangling `-r` and no path when find matches nothing --
        # the common case today, since the OCR file is the only
        # requirements*.txt in the repo.
        run: |
          find . -path ./.git -prune -o -path ./03-INFRA/deploy/ocr/api/requirements.txt -prune \
            -o -iname "requirements*.txt" -print0 \
            | xargs --no-run-if-empty -0 -n1 pip-audit -r

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate Docker Compose files
        # `docker compose config` only parses/merges/validates the model
        # (env var interpolation, schema) - it doesn't need a running daemon,
        # pull images, or build anything. Docker is preinstalled on
        # ubuntu-latest runners.
        #
        # FIRECRAWL_REDIS_PASSWORD is declared `${VAR:?message}` (required)
        # on purpose (2026-07-12 hardening, finding C): a silent empty
        # default there would mean `--requirepass ""`, i.e. auth silently
        # disabled. CI has no real .env, so a CI-only placeholder is
        # exported here purely to let `config` validate the template's
        # syntax/interpolation -- this never reaches a real deploy, which
        # still gets its own value from bootstrap-vps.sh's ensure_env_secret.
        run: |
          set -euo pipefail
          export FIRECRAWL_REDIS_PASSWORD="ci-validate-only-placeholder"
          # Same rationale for every other ${VAR:?} guard below: CI-only
          # placeholders so `config` can validate the template; real deploys
          # get their values from bootstrap-vps.sh.
          export FIRECRAWL_POSTGRES_PASSWORD="ci-validate-only-placeholder"
          export VAULT_LIBRARY_TOKEN="ci-validate-only-placeholder"
          export VAULT_MCP_UID=1000 VAULT_MCP_GID=1000
          for f in \
            03-INFRA/deploy/ocr/docker-compose.yml \
            03-INFRA/deploy/n8n/docker-compose.yml \
            03-INFRA/deploy/firecrawl/docker-compose.yml \
            03-INFRA/deploy/vault-mcp/docker-compose.yml \
          ; do
            echo "== $f =="
            docker compose -f "$f" config >/dev/null
          done

  powershell-analysis:
    # Pure static linting of .ps1 files on Linux - not execution. The
    # existing engine-tests-windows job (windows-latest) is untouched and
    # stays the only job that runs anything on Windows.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: PowerShell version
        # ubuntu-latest GitHub-hosted runners ship PowerShell Core (pwsh)
        # preinstalled; this step also fails fast and visibly if a future
        # runner image ever drops it, instead of silently skipping analysis.
        run: pwsh -Version

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -Repository PSGallery

      - name: PSScriptAnalyzer (static analysis, no execution)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = Get-ChildItem -Path . -Recurse -Filter '*.ps1' -File |
            Where-Object { $_.FullName -notmatch '[\\/]\.git[\\/]' }
          if (-not $files) {
            Write-Host "No .ps1 files found."
            exit 0
          }
          # Looped, not `-Path $files.FullName`: with more than one file that
          # binds an array where Invoke-ScriptAnalyzer's -Path expects a
          # single string and throws "Cannot convert System.Object[]"
          # (verified live in CI, 2026-07-12).
          $results = $files.FullName | ForEach-Object { Invoke-ScriptAnalyzer -Path $_ -Severity Warning, Error }
          $results | Format-Table -AutoSize
          $blocking = $results | Where-Object { $_.Severity -eq 'Error' }
          if ($blocking) {
            Write-Error "PSScriptAnalyzer found $($blocking.Count) Error-severity finding(s)."
            exit 1
          }

  vault-mcp-smoke:
    # The bundled vault-library MCP server, exercised for real (2026-07-14):
    # build the image, run it read-only on a fixture vault + bare repo (same
    # uid trick bootstrap-vps.sh uses), then drive the actual write path over
    # streamable-http MCP — create/read/update with the hash guard, plus the
    # 99-SECRETS refusal — and verify the commits landed in the bare repo as
    # author "Vault MCP". This is the repeatable proof that a Cloud-Server
    # install's notes door actually works, not just parses.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Build image
        run: docker build -t vault-mcp:ci 03-INFRA/deploy/vault-mcp

      - name: Provision fixture vault + bare repo
        run: |
          set -euo pipefail
          FIX=/tmp/vault-mcp-fixture
          mkdir -p "$FIX/seed"
          printf '# Start Here\n\nfixture vault for CI.\n' > "$FIX/seed/00-START-HERE.md"
          mkdir -p "$FIX/seed/01-NOTES" "$FIX/seed/99-SECRETS"
          printf 'placeholder\n' > "$FIX/seed/01-NOTES/.gitkeep"
          printf 'placeholder\n' > "$FIX/seed/99-SECRETS/.gitkeep"
          git -C "$FIX/seed" init -q --initial-branch=main
          git -C "$FIX/seed" add -A
          git -C "$FIX/seed" -c user.name=ci -c user.email=ci@localhost commit -qm "fixture seed"
          git clone -q --bare "$FIX/seed" "$FIX/vault.git"
          mkdir -p "$FIX/worktree"
          GIT_DIR="$FIX/vault.git" GIT_WORK_TREE="$FIX/worktree" git checkout -f main

      - name: Run container (compose-equivalent flags)
        run: |
          set -euo pipefail
          docker run -d --name vault-mcp \
            --read-only --tmpfs /tmp \
            --user "$(id -u):$(id -g)" \
            -p 127.0.0.1:8081:8080 \
            -e VAULT_ROOT=/vault \
            -e VAULT_GIT_DIR=/vault.git \
            -e VAULT_TOKEN=ci-smoke-token \
            -e VAULT_WRITE_ENABLED=true \
            -e MCP_HOST=0.0.0.0 -e MCP_PORT=8080 \
            -v /tmp/vault-mcp-fixture/worktree:/vault \
            -v /tmp/vault-mcp-fixture/vault.git:/vault.git \
            vault-mcp:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8081/healthz >/dev/null 2>&1; then
              echo "healthy after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "vault-mcp never became healthy"; docker logs vault-mcp; exit 1

      - name: MCP write-path smoke
        run: |
          set -euo pipefail
          pip install "mcp>=1.0,<2"
          SMOKE_TOKEN=ci-smoke-token python3 03-INFRA/deploy/vault-mcp/ci-smoke.py || {
            docker logs vault-mcp; exit 1;
          }

      - name: Verify commits landed in the bare repo
        run: |
          set -euo pipefail
          FIX=/tmp/vault-mcp-fixture
          git --git-dir="$FIX/vault.git" log --format='%an %s' main | head -5
          count=$(git --git-dir="$FIX/vault.git" log --format='%an' main | grep -c "Vault MCP")
          [ "$count" -ge 2 ] || { echo "expected >=2 'Vault MCP' commits, got $count"; exit 1; }
          # The refused 99-SECRETS write must NOT have produced a commit.
          if git --git-dir="$FIX/vault.git" log --name-only main | grep -q "99-SECRETS/should-never-land"; then
            echo "guardrail breach: a 99-SECRETS write was committed"; exit 1
          fi

  engine-tests:
    # Regression net for the engine (B1, 2026-07-08): sandboxed, never touches
    # the runner's real HOME. Canonical runner is `python -m pytest` (not
    # tests/run.sh, which is a thin Fedora-only convenience wrapper).
    runs-on: ubuntu-latest
    # The suite finishes in ~80s; a run past this window means a subprocess
    # wedged (a pwsh/git child holding a pipe open, a Read-Host with no
    # stdin). Fail with a captured log instead of hanging to the 6h default.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install test dependencies
        run: pip install pytest pyyaml

      - name: Engine regression suite
        working-directory: 03-INFRA/agent-universal-layer/tests
        run: python3 -m pytest -v

  engine-tests-windows:
    # B2.5: Windows now exercises the shared Python provisioner. POSIX-only
    # shell/doctor tests are skipped by pytest markers; the Windows-specific
    # value is the direct agent_sync.py guard smoke in a sandboxed USERPROFILE.
    runs-on: windows-latest
    # windows-latest is slow but not unbounded: a normal run is minutes. Cap
    # it so a Windows-only subprocess deadlock surfaces as a failed job with
    # a log, not a silent 6h hang burning a Windows runner.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install test dependencies
        run: pip install pytest pyyaml

      - name: Engine regression suite and agent_sync.py smoke
        working-directory: 03-INFRA/agent-universal-layer/tests
        run: python -m pytest -v
