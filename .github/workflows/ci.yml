name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default to read-only GITHUB_TOKEN permissions for every job in this
# workflow (least privilege - none of the jobs below push commits, open
# PRs/issues, or publish releases/packages, so read access to repo
# contents is all any of them need). Add a job-level `permissions:`
# override only if a specific job later needs more.
permissions:
  contents: read

jobs:
  self-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Python syntax check
        run: find . -path ./.git -prune -o -name "*.py" -print0 | xargs -0 -n1 python3 -m py_compile

      - name: YAML syntax check
        run: |
          python3 - <<'EOF'
          import sys, glob, yaml

          failed = False
          patterns = ["**/*.yaml", "**/*.yml"]
          seen = set()
          for pattern in patterns:
              for path in glob.glob(pattern, recursive=True):
                  if ".git/" in path or path in seen:
                      continue
                  seen.add(path)
                  try:
                      with open(path) as f:
                          yaml.safe_load(f)
                  except Exception as exc:
                      print(f"INVALID YAML: {path}: {exc}")
                      failed = True
          sys.exit(1 if failed else 0)
          EOF

      - name: Shell syntax check
        run: find . -path ./.git -prune -o -name "*.sh" -print0 | xargs -0 -n1 bash -n

      - name: Preflight (install.sh --check)
        run: bash install.sh --check

      - name: No committed Python bytecode or caches
        run: |
          hits="$(git ls-files | grep -E '\.pyc$|(^|/)__pycache__/' || true)"
          if [ -n "$hits" ]; then
            echo "Found committed Python bytecode/cache:"
            echo "$hits"
            exit 1
          fi

      - name: Leak-scan (anti-leak gates, S0)
        # Supersedes the old ad hoc "hardcoded home path" / "secret pattern"
        # greps: same patterns, but now scans EVERY commit newly introduced by
        # this push/PR (not just the final tree), so a value that lands in an
        # intermediate commit and is removed later still gets caught. Matches
        # are always redacted in the output — this log is public.
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              RANGE="${{ github.sha }}"
            else
              RANGE="$BEFORE..${{ github.sha }}"
            fi
          fi
          python3 03-INFRA/agent-universal-layer/leak-scan/leak_scan.py \
            --patterns 03-INFRA/agent-universal-layer/leak-scan/leak_patterns.yaml \
            --repo . \
            --commit-range "$RANGE"

  ruff-baseline:
    # NX-06: ruff is not clean yet (52 pre-existing findings at the time this
    # gate was added). Rather than fail every PR on that debt, or ignore ruff
    # entirely, this job compares current findings against a committed
    # baseline (03-INFRA/ruff-baseline.json), grouped by (file, rule code)
    # with a count. It fails ONLY when a (file, code) pair is new, or an
    # existing one's count goes UP - see 03-INFRA/scripts/ruff_baseline_check.py
    # for the exact rule and its docstring for how to regenerate the baseline
    # after intentionally fixing or accepting findings.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install ruff
        # Pinned to the version the committed baseline was generated with:
        # a ruff bump can change which rules fire by default and shift the
        # finding counts for reasons unrelated to any given PR's diff. Bump
        # this deliberately, alongside `--generate`-ing a fresh baseline.
        run: pip install "ruff==0.15.20"

      - name: Ruff baseline gate (03-INFRA)
        run: python3 03-INFRA/scripts/ruff_baseline_check.py

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: ShellCheck all shell scripts
        # Same discovery pattern as the "Shell syntax check" step in
        # self-check, swapping `bash -n` for `shellcheck`. ubuntu-latest
        # ships shellcheck preinstalled.
        run: find . -path ./.git -prune -o -name "*.sh" -print0 | xargs -0 shellcheck

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit (every requirements*.txt in the repo)
        # No package.json/package-lock.json exists in this repo (checked at
        # the time this job was added) so there is no npm audit step; add
        # one alongside this if a Node project shows up later.
        #
        # --ignore-vuln entries below are a known, tracked debt, not a
        # blanket suppression: fastapi==0.115.6 (03-INFRA/deploy/ocr/api/
        # requirements.txt) pins `starlette<0.42.0`, which cannot satisfy any
        # patched starlette release (fixes start at 0.47.2) -- fixing these
        # needs a validated fastapi major-version bump against a real
        # rapidocr/onnxruntime stack, out of scope for the pass that added
        # this gate (verified live via pip-audit, 2026-07-12). Any OTHER new
        # finding, on starlette or any other package, still fails the build.
        # Remove these IDs the moment fastapi is bumped and re-verified.
        run: |
          IGNORE_STARLETTE_UNTIL_FASTAPI_BUMP="--ignore-vuln PYSEC-2026-161 --ignore-vuln PYSEC-2026-249 --ignore-vuln PYSEC-2026-248 --ignore-vuln PYSEC-2026-1942 --ignore-vuln PYSEC-2026-1941 --ignore-vuln CVE-2026-48818 --ignore-vuln CVE-2026-48817"
          # -r must be the LAST flag: `xargs -n1` appends the found file path
          # as the final argument, so -r's value has to be right there, not
          # followed by more --ignore-vuln flags (verified live in CI,
          # 2026-07-12: "-r/--requirement: expected one argument").
          find . -path ./.git -prune -o -iname "requirements*.txt" -print0 \
            | xargs -0 -n1 pip-audit $IGNORE_STARLETTE_UNTIL_FASTAPI_BUMP -r

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate Docker Compose files
        # `docker compose config` only parses/merges/validates the model
        # (env var interpolation, schema) - it doesn't need a running daemon,
        # pull images, or build anything. Docker is preinstalled on
        # ubuntu-latest runners.
        #
        # FIRECRAWL_REDIS_PASSWORD is declared `${VAR:?message}` (required)
        # on purpose (2026-07-12 hardening, finding C): a silent empty
        # default there would mean `--requirepass ""`, i.e. auth silently
        # disabled. CI has no real .env, so a CI-only placeholder is
        # exported here purely to let `config` validate the template's
        # syntax/interpolation -- this never reaches a real deploy, which
        # still gets its own value from bootstrap-vps.sh's ensure_env_secret.
        run: |
          set -euo pipefail
          export FIRECRAWL_REDIS_PASSWORD="ci-validate-only-placeholder"
          for f in \
            03-INFRA/deploy/ocr/docker-compose.yml \
            03-INFRA/deploy/n8n/docker-compose.yml \
            03-INFRA/deploy/firecrawl/docker-compose.yml \
          ; do
            echo "== $f =="
            docker compose -f "$f" config >/dev/null
          done

  powershell-analysis:
    # Pure static linting of .ps1 files on Linux - not execution. The
    # existing engine-tests-windows job (windows-latest) is untouched and
    # stays the only job that runs anything on Windows.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: PowerShell version
        # ubuntu-latest GitHub-hosted runners ship PowerShell Core (pwsh)
        # preinstalled; this step also fails fast and visibly if a future
        # runner image ever drops it, instead of silently skipping analysis.
        run: pwsh -Version

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -Repository PSGallery

      - name: PSScriptAnalyzer (static analysis, no execution)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = Get-ChildItem -Path . -Recurse -Filter '*.ps1' -File |
            Where-Object { $_.FullName -notmatch '[\\/]\.git[\\/]' }
          if (-not $files) {
            Write-Host "No .ps1 files found."
            exit 0
          }
          # Looped, not `-Path $files.FullName`: with more than one file that
          # binds an array where Invoke-ScriptAnalyzer's -Path expects a
          # single string and throws "Cannot convert System.Object[]"
          # (verified live in CI, 2026-07-12).
          $results = $files.FullName | ForEach-Object { Invoke-ScriptAnalyzer -Path $_ -Severity Warning, Error }
          $results | Format-Table -AutoSize
          $blocking = $results | Where-Object { $_.Severity -eq 'Error' }
          if ($blocking) {
            Write-Error "PSScriptAnalyzer found $($blocking.Count) Error-severity finding(s)."
            exit 1
          }

  engine-tests:
    # Regression net for the engine (B1, 2026-07-08): sandboxed, never touches
    # the runner's real HOME. Canonical runner is `python -m pytest` (not
    # tests/run.sh, which is a thin Fedora-only convenience wrapper).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install test dependencies
        run: pip install pytest pyyaml

      - name: Engine regression suite
        working-directory: 03-INFRA/agent-universal-layer/tests
        run: python3 -m pytest -v

  engine-tests-windows:
    # B2.5: Windows now exercises the shared Python provisioner. POSIX-only
    # shell/doctor tests are skipped by pytest markers; the Windows-specific
    # value is the direct agent_sync.py guard smoke in a sandboxed USERPROFILE.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install test dependencies
        run: pip install pytest pyyaml

      - name: Engine regression suite and agent_sync.py smoke
        working-directory: 03-INFRA/agent-universal-layer/tests
        run: python -m pytest -v
